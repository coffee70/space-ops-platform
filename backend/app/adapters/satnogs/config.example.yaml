platform:
  ingest_url: "http://platform-api:8000/telemetry/realtime/ingest"
  source_resolve_url: "http://platform-api:8000/telemetry/sources/resolve"
  observations_batch_upsert_url: "http://platform-api:8000/telemetry/sources/{source_id}/observations:batch-upsert"
  backfill_progress_url: "http://platform-api:8000/telemetry/sources/{source_id}/backfill-progress"
  live_state_url: "http://platform-api:8000/telemetry/sources/{source_id}/live-state"

vehicle:
  slug: "lasarsat"
  name: "LASARSAT"
  norad_id: 62391
  monitoring_start_time: "2026-04-10T00:00:00Z"
  allowed_source_callsigns:
    - "OK0LSR"
  vehicle_config_path: "vehicles/lasarsat.yaml"
  decoder:
    strategy: "kaitai"
    decoder_id: "lasarsat"


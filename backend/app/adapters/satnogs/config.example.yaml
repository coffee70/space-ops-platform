#   decoder:
#     strategy: "aprs"

satnogs:
  base_url: "https://network.satnogs.org"
  api_token: ""
  transmitter_uuid: "C3RnLSSuaKzWhHrtJCqUgu"
  status: "good"
  upcoming_status: "future"
  upcoming_lookahead_hours: 24
  observation_sync_interval_seconds: 600
  poll_interval_seconds: 60
  download:
    max_concurrent_observation_fetches: 2
    max_concurrent_artifact_downloads: 2

publisher:
  batch_size_events: 50
  timeout_seconds: 10
  retry:
    max_attempts: 3
    backoff_seconds: 1
    backoff_multiplier: 2
    retryable_status_codes: [408, 425, 429, 500, 502, 503, 504]

dlq:
  root_dir: "/app/runtime/satnogs-adapter/dlq"
  write_observation_dlq: true
